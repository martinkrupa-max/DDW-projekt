<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmy</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./main.js"></script>
</head>

<body>
    <div id="app">
        <navbar></navbar>

        <filter-bar :certificates="getCertificates()" :filters="filters" :update-filters="updateFilters" :reset-filters="resetFilters">
        </filter-bar>


        <router-view :films="films" :toggle-favorite="toggleFavorite" :is-favorite="isFavorite" :get-filtered-films="getFilteredFilms" :toggle-favorite="toggleFavorite" :is-favorite="isFavorite" :remove-film="removeFilmByTitle" :add-film="addFilm">
        </router-view>
    </div>

</body>

</html>
