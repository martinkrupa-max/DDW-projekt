<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmy</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./main.js"></script>
</head>

<body>
    <div id="app">
        <navbar></navbar>

        <filter-bar :certificates="getCertificates()" :filters="filters" :update-filters="updateFilters" :reset-filters="resetFilters">
        </filter-bar>

        <div class="movie-grid">
            <card v-for="film in getFilteredFilms()" :key="film.filmTitle" :film="film" :remove-film="removeFilmByTitle" :toggle-favorite="toggleFavorite" :is-favorite="isFavorite">
            </card>
        </div>
    </div>
</body>

</html>
